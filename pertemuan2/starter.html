<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starter Code - Pertemuan 2 (Semantic & Forms)</title>
</head>
<body>

    <!-- SEMANTIC: <header> digunakan untuk bagian kepala website (logo/judul) -->
    <header>
        <h1>Rumah Sakit Digital</h1>
        <p>Melayani dengan Hati dan Teknologi</p>
    </header>

    <hr>

    <!-- SEMANTIC: <nav> digunakan khusus untuk menu navigasi -->
    <nav>
        <a href="#">Beranda</a> | 
        <a href="#">Jadwal Dokter</a> | 
        <a href="#">Pendaftaran Pasien</a>
    </nav>

    <hr>

    <!-- SEMANTIC: <main> adalah pembungkus konten utama yang unik di halaman ini -->
    <main>
        
        <!-- <section> digunakan untuk mengelompokkan konten yang bertema sama -->
        <section>
            <h2>Formulir Pendaftaran Pasien</h2>
            <p>Harap isi data dengan benar untuk keperluan rekam medis.</p>

            <!-- <form> adalah wadah untuk mengumpulkan data dari user -->
            <form action="#">
                
                <!-- Kita gunakan <table> agar tampilan form rapi tanpa CSS -->
                <table border="0" cellpadding="5">
                    <tr>
                        <!-- <label> sangat penting untuk UX & aksesibilitas -->
                        <td><label for="nama">Nama Lengkap</label></td>
                        <td>:</td>
                        <!-- input type="text" untuk teks biasa -->
                        <td><input type="text" id="nama" name="nama" required></td>
                    </tr>

                    <tr>
                        <td><label for="email">Email</label></td>
                        <td>:</td>
                        <!-- input type="email" otomatis memvalidasi format email -->
                        <td><input type="email" id="email" name="email" placeholder="nama@email.com"></td>
                    </tr>

                    <tr>
                        <td><label for="tgl_lahir">Tanggal Lahir</label></td>
                        <td>:</td>
                        <!-- input type="date" memunculkan pemilih tanggal otomatis -->
                        <td><input type="date" id="tgl_lahir" name="tgl_lahir"></td>
                    </tr>

                    <tr>
                        <td><label>Jenis Kelamin</label></td>
                        <td>:</td>
                        <td>
                            <!-- input type="radio" untuk pilihan tunggal -->
                            <input type="radio" id="l" name="jk" value="L"> <label for="l">Laki-laki</label>
                            <input type="radio" id="p" name="jk" value="P"> <label for="p">Perempuan</label>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="poli">Pilih Poli</label></td>
                        <td>:</td>
                        <td>
                            <!-- <select> untuk membuat menu dropdown -->
                            <select id="poli" name="poli">
                                <option value="">-- Pilih Layanan --</option>
                                <option value="umum">Poli Umum</option>
                                <option value="gigi">Poli Gigi</option>
                                <option value="anak">Poli Anak</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td valign="top"><label for="keluhan">Keluhan</label></td>
                        <td valign="top">:</td>
                        <td>
                            <!-- <textarea> untuk input teks yang panjang/berbaris-baris -->
                            <textarea id="keluhan" name="keluhan" rows="4" cols="30"></textarea>
                        </td>
                    </tr>

                    <tr>
                        <td></td>
                        <td></td>
                        <td>
                            <!-- button type="submit" untuk mengirim data -->
                            <button type="submit">Daftarkan Pasien</button>
                        </td>
                    </tr>
                </table>
            </form>
        </section>

        <br>

        <section>
            <h2>Lokasi Cabang Kami</h2>
            <!-- <iframe> digunakan untuk menampilkan konten dari luar (seperti Google Maps) -->
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d126748.56347862248!2d107.5731164!3d-6.9034443!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e68e6398251077d%3A0x1116ad199738d2f!2sBandung%2C%20Jawa%20Barat!5e0!3m2!1sid!2sid!4v1700000000000" 
                width="400" 
                height="250" 
                style="border:0;" 
                allowfullscreen="">
            </iframe>
        </section>

    </main>

    <hr>

    <!-- SEMANTIC: <footer> digunakan untuk bagian bawah (copyright/kontak) -->
    <footer>
        <p>&copy; 2026 RS Digital - Materi Kuliah Web Dasar Semester 1</p>
    </footer>

</body>
</html>
