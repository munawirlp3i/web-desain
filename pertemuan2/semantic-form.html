                    <tr>

                    <option value="">Informatika</option>
                    <option value="">Komputer Akuntasi</option>
                    <option value="">Sekretaris</option>
                    <option value="">DBC(Digital Bisnis Comunication)</option>
                </select>
                <br>
                <label for="">Deskripsi</label>
                <textarea name="" id="" style="height: 100px;"></textarea>
                <br>
                <button type="submit">Kirim</button>
                <button type="reset">Reset Form</button>
            </form>
