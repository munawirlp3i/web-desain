<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Halaman Transaksi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body style="background-color: #DEDEDE;">
    <script src="script.js"></script>
    
    <div class="container">
        <div class="row mt-3">
            <div class="col-md-6">
                <div class="card border-0 rounded-4 p-3">
                    <h3>Proses Transaksi</h3>
                    <form action="#">
                        <div class="form-group mb-3">
                            <label for="" class="form-label">Pilih Produk</label>
                            <select class="form-select" id="pilihan_produk" onchange="ubahPilihanProduk()">
                                <option selected>-- Pilih Produk --</option>
                            </select>
                        </div>
                        <div class="form-group mb-3">
                            <label for="nama_pembeli" class="form-label">Nama Pembeli</label>
                            <input type="text" class="form-control" id="nama_pembeli" placeholder="Isi nama pembeli">
                        </div>
                        <div class="form-group">
                            <label for="jumlah" class="form-label">Jumlah(Qty)</label>
                            <input type="number" class="form-control" oninput="hitungTotal()" id="jumlah" min="1" value="1" placeholder="Isi jumlahnya">
                        </div>
                        <hr>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <span class="fw-bold text-secondary">Total pemesanan:</span>
                            </div>
                            <div class="col-md-6">
                                <span id="total_pemesanan" class="text-danger fs-4 fw-bold">RP. 0</span>
                            </div>
                        </div>
                        <button class="btn btn-success w-100" onclick="pesanProduk()">Pesan Sekarang</button>
                    </form>
                </div>
            </div>
            <div class="col-md-6">
                <h1>History Section</h1>
            </div>
        </div>
    </div>




    
</body>

</html>
