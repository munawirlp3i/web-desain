<body>
    


    <script>
        console.log('Hello World');

        // Contoh variable 
        var angka1 = 'Ini Tulisan';
        let angka2 = 1;
        const angka3 = true;

        // Tambah, Kurang, Kali, Bagi
        let nilai1 = 5;
        let nilai2 = 3;

        // cara tambah
        console.log(nilai1 + nilai2);
        // cara kali
        console.log(nilai1 * nilai2);
        // cara kurang
        console.log(nilai1 - nilai2);
        // cara bagi
        console.log(nilai1 / nilai2);

        // Logika Pengecekan
        if(5 >= 5) {
            console.log('Benar')
        } else {

        }

        // looping
        for (let i = 1; i <= 20; i++) {
            console.log('Halo');
        }

        

    </script>
