<!doctype html>
<html lang="id" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pertemuan 9 - Belajar JavaScript</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      /* Apply smooth transition to background, text, and borders */
      body,
      .card,
      .navbar,
      .footer,
      .list-group-item,
      .dropdown-menu {
        transition:
          background-color 0.3s ease,
          color 0.3s ease,
          border-color 0.3s ease;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5 text-center">
      <div class="card p-4 shadow-sm max-w-md mx-auto" style="max-width: 500px">
        <h2 id="status-kuliah" class="text-secondary mb-4">
          Status: Belum Mulai Belajar
        </h2>

        <div class="d-grid gap-2 d-md-block">
          <button onclick="mulaiBelajar()" class="btn btn-primary">
            Mulai Kuliah
          </button>
          <button onclick="selesaiBelajar()" class="btn btn-danger">
            Selesai
          </button>
          <button
            onclick="changeTheme()"
            id="btn-change-theme"
            class="btn btn-dark"
          >
            Dark Mode
          </button>
        </div>
      </div>
    </div>

    <!-- Tambahkan di bagian bawah file HTML Anda, sebelum tag </body> -->
    <div class="container mt-5">
      <h2 class="text-center mb-3 dark">Daftar Mahasiswa</h2>
      <div class="row">
        <div class="col-md-4">
          <input
            type="text"
            class="form-control mb-3"
            id="search"
            placeholder="Cari Nama"
            onkeyup="filter()"
          />
        </div>
        <div class="col-md-4">
          <select class="form-select mb-3" id="filter-jurusan">
            <option value="all">Semua</option>
            <option value="IK">Informatika</option>
            <option value="OM">Otomotif</option>
            <option value="DBC">Desain dan Branding</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary" onclick="filter()">Filter</button>
        </div>
      </div>
      <table class="table table-bordered">
        <thead class="table-dark">
          <tr>
            <th>No</th>
            <th>Nama</th>
            <th>NIM</th>
            <th>Jurusan</th>
          </tr>
        </thead>
        <tbody id="tabel-mhs">
          <!-- Data akan diisi oleh JavaScript -->
        </tbody>
      </table>
    </div>

    <script src="starter.js"></script>
  </body>
</html>
